<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            color: #0f172a;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .new-note-form {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: none;
        }

        .panel-stack {
            display: grid;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #333;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-delete {
            background: #ef4444;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        .btn-delete:hover {
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .note-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            animation: fadeIn 0.3s ease-in;
        }

        .note-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .note-card h3 {
            color: #333;
            font-size: 1.25rem;
            margin-bottom: 0.75rem;
            word-wrap: break-word;
        }

        .note-card p {
            color: #666;
            margin-bottom: 1rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .note-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #e0e0e0;
            padding-top: 1rem;
        }

        .note-date {
            font-size: 0.875rem;
            color: #999;
        }

        .empty-state {
            background: white;
            border-radius: 12px;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .empty-state h2 {
            color: #333;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: #666;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            padding: 2rem;
        }

        .auth-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .auth-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .btn-secondary {
            background: white;
            color: #4f46e5;
            border: 2px solid #4f46e5;
            padding: 0.65rem 1.5rem;
        }

        .helper {
            margin-top: 0.75rem;
            color: #475569;
            font-size: 0.95rem;
        }

        .hidden {
            display: none !important;
        }

        .session-bar {
            display: none;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            backdrop-filter: blur(4px);
        }

        .session-email {
            font-weight: 600;
        }

        .status-text {
            margin-top: 0.5rem;
            color: #ef4444;
            font-weight: 600;
        }

        .upload-helper {
            color: #475569;
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }

        .file-picker {
            width: 100%;
            border: 2px dashed #cbd5e1;
            border-radius: 10px;
            padding: 1rem;
            background: #f8fafc;
            cursor: pointer;
        }

        .selected-files {
            margin-top: 1rem;
            color: #334155;
            font-size: 0.95rem;
        }

        .selected-files ul {
            margin: 0.5rem 0 0;
            padding-left: 1.25rem;
        }

        .progress-shell {
            width: 100%;
            height: 12px;
            background: #e2e8f0;
            border-radius: 999px;
            overflow: hidden;
            margin-top: 1rem;
        }

        .progress-bar {
            width: 0;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(135deg, #22c55e 0%, #0ea5e9 100%);
            transition: width 0.2s ease;
        }

        .upload-meta {
            margin-top: 0.75rem;
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
            color: #475569;
            font-size: 0.95rem;
        }

        .upload-results {
            margin-top: 1rem;
            display: grid;
            gap: 0.75rem;
        }

        .upload-result {
            padding: 0.9rem 1rem;
            border-radius: 10px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }

        .upload-result strong {
            display: block;
            color: #0f172a;
            margin-bottom: 0.25rem;
        }

        .upload-result span {
            color: #475569;
            font-size: 0.9rem;
            word-break: break-all;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .header h1 {
                font-size: 2rem;
            }

            .notes-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Quick Notes</h1>
            <p>Capture your thoughts instantly</p>
        </div>

        <div id="sessionBar" class="session-bar">
            <span class="session-email" id="sessionEmail"></span>
            <button id="logoutBtn" class="btn btn-secondary">Logout</button>
        </div>

        <div id="authCard" class="auth-card">
            <h2 style="margin-bottom: 0.5rem;">Sign in to continue</h2>
            <p class="helper">Use your existing Supabase email/password account to access your notes.</p>
            <form id="loginForm" style="margin-top: 1rem;">
                <div class="form-group">
                    <label for="emailInput">Email</label>
                    <input type="email" id="emailInput" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="passwordInput">Password</label>
                    <input type="password" id="passwordInput" placeholder="••••••••" required>
                </div>
                <div class="auth-actions">
                    <button type="submit" class="btn">Sign In</button>
                </div>
                <div id="authStatus" class="status-text hidden"></div>
            </form>
        </div>

        <div class="panel-stack">
            <div class="new-note-form" id="noteFormCard">
                <form id="noteForm">
                    <div class="form-group">
                        <label for="noteTitle">Title</label>
                        <input type="text" id="noteTitle" placeholder="Enter note title" required>
                    </div>
                    <div class="form-group">
                        <label for="noteContent">Content</label>
                        <textarea id="noteContent" placeholder="Write your note here..." required></textarea>
                    </div>
                    <button type="submit" class="btn">Add Note</button>
                </form>
            </div>

            <div class="new-note-form" id="uploadCard">
                <form id="uploadForm">
                    <div class="form-group">
                        <label for="fileInput">Upload files</label>
                        <p class="upload-helper">Files are sent directly to your Supabase storage bucket using your active session JWT.</p>
                        <input type="file" id="fileInput" class="file-picker" multiple>
                    </div>
                    <div id="selectedFiles" class="selected-files hidden"></div>
                    <button type="submit" class="btn" id="uploadBtn">Upload to Storage</button>
                    <div id="uploadStatus" class="status-text hidden"></div>
                    <div class="progress-shell hidden" id="uploadProgressShell">
                        <div class="progress-bar" id="uploadProgressBar"></div>
                    </div>
                    <div class="upload-meta hidden" id="uploadMeta">
                        <span id="uploadProgressLabel">0%</span>
                        <span id="uploadTargetLabel"></span>
                    </div>
                    <div id="uploadResults" class="upload-results hidden"></div>
                </form>
            </div>
        </div>

        <div id="notesContainer" class="loading">Loading notes...</div>
    </div>

    <script src="/env.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const API_URL = '/api/notes';
        const noteForm = document.getElementById('noteForm');
        const notesContainer = document.getElementById('notesContainer');
        const titleInput = document.getElementById('noteTitle');
        const contentInput = document.getElementById('noteContent');
        const authCard = document.getElementById('authCard');
        const noteFormCard = document.getElementById('noteFormCard');
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');
        const authStatus = document.getElementById('authStatus');
        const logoutBtn = document.getElementById('logoutBtn');
        const sessionBar = document.getElementById('sessionBar');
        const sessionEmail = document.getElementById('sessionEmail');
        const uploadCard = document.getElementById('uploadCard');
        const uploadForm = document.getElementById('uploadForm');
        const fileInput = document.getElementById('fileInput');
        const selectedFiles = document.getElementById('selectedFiles');
        const uploadBtn = document.getElementById('uploadBtn');
        const uploadStatus = document.getElementById('uploadStatus');
        const uploadProgressShell = document.getElementById('uploadProgressShell');
        const uploadProgressBar = document.getElementById('uploadProgressBar');
        const uploadMeta = document.getElementById('uploadMeta');
        const uploadProgressLabel = document.getElementById('uploadProgressLabel');
        const uploadTargetLabel = document.getElementById('uploadTargetLabel');
        const uploadResults = document.getElementById('uploadResults');

        let supabaseClient = null;
        let session = null;
        let uploadProgressTimer = null;

        function toggleAuthUI(isAuthed) {
            authCard.classList.toggle('hidden', isAuthed);
            noteFormCard.style.display = isAuthed ? 'block' : 'none';
            uploadCard.style.display = isAuthed ? 'block' : 'none';
            sessionBar.style.display = isAuthed ? 'flex' : 'none';
            notesContainer.className = isAuthed ? 'loading' : 'empty-state';
            if (!isAuthed) {
                notesContainer.innerHTML = '<div class="empty-state"><h2>Login required</h2><p>Please sign in to view your notes.</p></div>';
                resetUploadUI();
            }
        }

        function showStatus(message, isError = false) {
            authStatus.textContent = message;
            authStatus.classList.toggle('hidden', !message);
            authStatus.style.color = isError ? '#ef4444' : '#22c55e';
        }

        function showUploadStatus(message, isError = false) {
            uploadStatus.textContent = message;
            uploadStatus.classList.toggle('hidden', !message);
            uploadStatus.style.color = isError ? '#ef4444' : '#22c55e';
        }

        function getEnvConfig() {
            return window.__ENV__ ?? {};
        }

        function isStorageConfigured() {
            const env = getEnvConfig();
            return Boolean(env.SUPABASE_URL && env.SUPABASE_ANON_KEY && env.SUPABASE_STORAGE_BUCKET);
        }

        function resetUploadUI() {
            clearUploadProgressTimer();
            uploadForm.reset();
            selectedFiles.innerHTML = '';
            selectedFiles.classList.add('hidden');
            uploadResults.innerHTML = '';
            uploadResults.classList.add('hidden');
            showUploadStatus('');
            setUploadProgress(0);
            uploadProgressShell.classList.add('hidden');
            uploadMeta.classList.add('hidden');
            uploadTargetLabel.textContent = '';
            uploadBtn.disabled = false;
        }

        function clearUploadProgressTimer() {
            if (uploadProgressTimer) {
                clearInterval(uploadProgressTimer);
                uploadProgressTimer = null;
            }
        }

        function setUploadProgress(value) {
            const boundedValue = Math.max(0, Math.min(100, value));
            uploadProgressBar.style.width = `${boundedValue}%`;
            uploadProgressLabel.textContent = `${Math.round(boundedValue)}%`;
        }

        function startUploadSegment(baseProgress, segmentSize) {
            clearUploadProgressTimer();
            let currentProgress = baseProgress;
            setUploadProgress(currentProgress);
            uploadProgressShell.classList.remove('hidden');
            uploadMeta.classList.remove('hidden');

            uploadProgressTimer = setInterval(() => {
                const targetProgress = baseProgress + segmentSize * 0.9;
                currentProgress = Math.min(targetProgress, currentProgress + Math.max(segmentSize * 0.08, 1));
                setUploadProgress(currentProgress);
            }, 180);
        }

        function renderSelectedFiles(files) {
            if (!files.length) {
                selectedFiles.innerHTML = '';
                selectedFiles.classList.add('hidden');
                return;
            }

            selectedFiles.classList.remove('hidden');
            selectedFiles.innerHTML = `
                <strong>Selected ${files.length} file${files.length === 1 ? '' : 's'}</strong>
                <ul>
                    ${files.map(file => `<li>${escapeHtml(file.name)} (${formatFileSize(file.size)})</li>`).join('')}
                </ul>
            `;
        }

        function renderUploadResults(items) {
            if (!items.length) {
                uploadResults.innerHTML = '';
                uploadResults.classList.add('hidden');
                return;
            }

            uploadResults.classList.remove('hidden');
            uploadResults.innerHTML = items.map(item => `
                <div class="upload-result">
                    <strong>${escapeHtml(item.fileName)}</strong>
                    <span>${escapeHtml(item.fullPath)}</span>
                </div>
            `).join('');
        }

        function formatFileSize(size) {
            if (size < 1024) return `${size} B`;
            if (size < 1024 * 1024) return `${(size / 1024).toFixed(1)} KB`;
            if (size < 1024 * 1024 * 1024) return `${(size / (1024 * 1024)).toFixed(1)} MB`;
            return `${(size / (1024 * 1024 * 1024)).toFixed(1)} GB`;
        }

        function sanitizeFileName(fileName) {
            return fileName.replace(/[^a-zA-Z0-9._-]/g, '_');
        }

        function buildStoragePath(userId, fileName, index) {
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
            return `${userId}/${timestamp}-${index}-${sanitizeFileName(fileName)}`;
        }

        function createStorageClient(accessToken) {
            const env = getEnvConfig();
            return window.supabase.createClient(env.SUPABASE_URL, env.SUPABASE_ANON_KEY, {
                accessToken: async () => session?.access_token || accessToken || null
            });
        }

        async function initSupabase() {
            const __ENV__ = getEnvConfig();
            if (!__ENV__?.SUPABASE_URL || !__ENV__?.SUPABASE_ANON_KEY) {
                notesContainer.innerHTML = '<div class="empty-state"><h2>Env missing</h2><p>Supabase URL or anon key not provided.</p></div>';
                return;
            }

            supabaseClient = window.supabase.createClient(__ENV__.SUPABASE_URL, __ENV__.SUPABASE_ANON_KEY);

            const { data } = await supabaseClient.auth.getSession();
            session = data?.session ?? null;
            handleSessionChange(session);

            supabaseClient.auth.onAuthStateChange((_event, newSession) => {
                session = newSession;
                handleSessionChange(newSession);
            });
        }

        function handleSessionChange(currentSession) {
            if (currentSession?.user) {
                sessionEmail.textContent = currentSession.user.email;
                toggleAuthUI(true);
                if (!isStorageConfigured()) {
                    showUploadStatus('Storage upload is unavailable because SUPABASE_STORAGE_BUCKET is missing.', true);
                    uploadBtn.disabled = true;
                } else {
                    uploadBtn.disabled = false;
                    showUploadStatus('');
                }
                fetchNotes();
            } else {
                toggleAuthUI(false);
            }
        }

        async function fetchNotes() {
            if (!session?.access_token) return;
            try {
                notesContainer.textContent = 'Loading notes...';
                const response = await fetch(API_URL, {
                    headers: {
                        Authorization: `Bearer ${session.access_token}`
                    }
                });

                if (response.status === 401) {
                    handleSessionChange(null);
                    return;
                }

                if (!response.ok) throw new Error('Failed to fetch notes');
                const notes = await response.json();
                renderNotes(notes);
            } catch (error) {
                console.error('Error:', error);
                notesContainer.innerHTML = '<div class="empty-state"><h2>Error loading notes</h2><p>Please try again later.</p></div>';
            }
        }

        function renderNotes(notes) {
            if (notes.length === 0) {
                notesContainer.innerHTML = '<div class="empty-state"><h2>No notes yet</h2><p>Create your first note above to get started!</p></div>';
                return;
            }

            notesContainer.className = 'notes-grid';
            notesContainer.innerHTML = notes.map(note => `
                <div class="note-card" data-id="${note.id}">
                    <h3>${escapeHtml(note.title)}</h3>
                    <p>${escapeHtml(note.content)}</p>
                    <div class="note-meta">
                        <span class="note-date">${formatDate(note.created_at)}</span>
                        <button class="btn btn-delete" onclick="deleteNote(${note.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins} min ago`;
            if (diffHours < 24) return `${diffHours} hour${diffHours > 1 ? 's' : ''} ago`;
            if (diffDays < 7) return `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;

            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        fileInput.addEventListener('change', () => {
            renderSelectedFiles(Array.from(fileInput.files || []));
        });

        noteForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = titleInput.value.trim();
            const content = contentInput.value.trim();

            if (!title || !content || !session?.access_token) return;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        Authorization: `Bearer ${session.access_token}`
                    },
                    body: JSON.stringify({ title, content })
                });

                if (response.status === 401) {
                    handleSessionChange(null);
                    return;
                }

                if (!response.ok) throw new Error('Failed to create note');

                titleInput.value = '';
                contentInput.value = '';
                fetchNotes();
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to create note. Please try again.');
            }
        });

        async function deleteNote(id) {
            if (!confirm('Are you sure you want to delete this note?')) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE',
                    headers: {
                        Authorization: `Bearer ${session.access_token}`
                    }
                });

                if (response.status === 401) {
                    handleSessionChange(null);
                    return;
                }

                if (!response.ok) throw new Error('Failed to delete note');
                fetchNotes();
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to delete note. Please try again.');
            }
        }

        window.deleteNote = deleteNote;

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!supabaseClient) return;
            showStatus('Signing in...', false);
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                showStatus(error.message, true);
                return;
            }

            showStatus('Signed in successfully');
        });

        logoutBtn.addEventListener('click', async () => {
            if (!supabaseClient) return;
            await supabaseClient.auth.signOut();
            session = null;
            handleSessionChange(null);
        });

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const env = getEnvConfig();
            const files = Array.from(fileInput.files || []);

            if (!session?.access_token || !session?.user?.id) {
                showUploadStatus('You must be signed in before uploading files.', true);
                return;
            }

            if (!isStorageConfigured()) {
                showUploadStatus('Storage upload is unavailable because SUPABASE_STORAGE_BUCKET is missing.', true);
                return;
            }

            if (!files.length) {
                showUploadStatus('Choose at least one file to upload.', true);
                return;
            }

            const storageClient = createStorageClient(session.access_token);
            const uploadedItems = [];
            uploadBtn.disabled = true;
            uploadResults.classList.add('hidden');
            uploadResults.innerHTML = '';
            showUploadStatus(`Uploading ${files.length} file${files.length === 1 ? '' : 's'}...`);

            try {
                for (let index = 0; index < files.length; index += 1) {
                    const file = files[index];
                    const baseProgress = (index / files.length) * 100;
                    const segmentSize = 100 / files.length;
                    const targetPath = buildStoragePath(session.user.id, file.name, index + 1);

                    uploadTargetLabel.textContent = `Uploading ${file.name} to ${env.SUPABASE_STORAGE_BUCKET}/${targetPath}`;
                    startUploadSegment(baseProgress, segmentSize);

                    const { data, error } = await storageClient.storage
                        .from(env.SUPABASE_STORAGE_BUCKET)
                        .upload(targetPath, file, {
                            cacheControl: '3600',
                            contentType: file.type || 'application/octet-stream',
                            upsert: false
                        });

                    clearUploadProgressTimer();

                    if (error) {
                        throw error;
                    }

                    setUploadProgress(baseProgress + segmentSize);
                    uploadedItems.push({
                        fileName: file.name,
                        fullPath: data.fullPath
                    });
                }

                setUploadProgress(100);
                showUploadStatus(`Uploaded ${uploadedItems.length} file${uploadedItems.length === 1 ? '' : 's'} successfully.`);
                renderUploadResults(uploadedItems);
                fileInput.value = '';
                renderSelectedFiles([]);
            } catch (error) {
                console.error('Upload error:', error);
                showUploadStatus(error.message || 'Upload failed. Please try again.', true);
            } finally {
                clearUploadProgressTimer();
                uploadBtn.disabled = false;
                if (!uploadStatus.classList.contains('hidden')) {
                    uploadProgressShell.classList.remove('hidden');
                    uploadMeta.classList.remove('hidden');
                }
            }
        });

        initSupabase();
    </script>
</body>
</html>
