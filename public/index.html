<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            color: #0f172a;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .new-note-form {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: none;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #333;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-delete {
            background: #ef4444;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        .btn-delete:hover {
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .note-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            animation: fadeIn 0.3s ease-in;
        }

        .note-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .note-card h3 {
            color: #333;
            font-size: 1.25rem;
            margin-bottom: 0.75rem;
            word-wrap: break-word;
        }

        .note-card p {
            color: #666;
            margin-bottom: 1rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .note-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #e0e0e0;
            padding-top: 1rem;
        }

        .note-date {
            font-size: 0.875rem;
            color: #999;
        }

        .empty-state {
            background: white;
            border-radius: 12px;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .empty-state h2 {
            color: #333;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: #666;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            padding: 2rem;
        }

        .auth-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .auth-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .btn-secondary {
            background: white;
            color: #4f46e5;
            border: 2px solid #4f46e5;
            padding: 0.65rem 1.5rem;
        }

        .helper {
            margin-top: 0.75rem;
            color: #475569;
            font-size: 0.95rem;
        }

        .hidden {
            display: none !important;
        }

        .session-bar {
            display: none;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            backdrop-filter: blur(4px);
        }

        .session-email {
            font-weight: 600;
        }

        .status-text {
            margin-top: 0.5rem;
            color: #ef4444;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .header h1 {
                font-size: 2rem;
            }

            .notes-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Quick Notes</h1>
            <p>Capture your thoughts instantly</p>
        </div>

        <div id="sessionBar" class="session-bar">
            <span class="session-email" id="sessionEmail"></span>
            <button id="logoutBtn" class="btn btn-secondary">Logout</button>
        </div>

        <div id="authCard" class="auth-card">
            <h2 style="margin-bottom: 0.5rem;">Sign in to continue</h2>
            <p class="helper">Use your existing Supabase email/password account to access your notes.</p>
            <form id="loginForm" style="margin-top: 1rem;">
                <div class="form-group">
                    <label for="emailInput">Email</label>
                    <input type="email" id="emailInput" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="passwordInput">Password</label>
                    <input type="password" id="passwordInput" placeholder="••••••••" required>
                </div>
                <div class="auth-actions">
                    <button type="submit" class="btn">Sign In</button>
                </div>
                <div id="authStatus" class="status-text hidden"></div>
            </form>
        </div>

        <div class="new-note-form" id="noteFormCard">
            <form id="noteForm">
                <div class="form-group">
                    <label for="noteTitle">Title</label>
                    <input type="text" id="noteTitle" placeholder="Enter note title" required>
                </div>
                <div class="form-group">
                    <label for="noteContent">Content</label>
                    <textarea id="noteContent" placeholder="Write your note here..." required></textarea>
                </div>
                <button type="submit" class="btn">Add Note</button>
            </form>
        </div>

        <div id="notesContainer" class="loading">Loading notes...</div>
    </div>

    <script src="/env.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const API_URL = '/api/notes';
        const noteForm = document.getElementById('noteForm');
        const notesContainer = document.getElementById('notesContainer');
        const titleInput = document.getElementById('noteTitle');
        const contentInput = document.getElementById('noteContent');
        const authCard = document.getElementById('authCard');
        const noteFormCard = document.getElementById('noteFormCard');
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');
        const authStatus = document.getElementById('authStatus');
        const logoutBtn = document.getElementById('logoutBtn');
        const sessionBar = document.getElementById('sessionBar');
        const sessionEmail = document.getElementById('sessionEmail');

        let supabaseClient = null;
        let session = null;

        function toggleAuthUI(isAuthed) {
            authCard.classList.toggle('hidden', isAuthed);
            noteFormCard.style.display = isAuthed ? 'block' : 'none';
            sessionBar.style.display = isAuthed ? 'flex' : 'none';
            notesContainer.className = isAuthed ? 'loading' : 'empty-state';
            if (!isAuthed) {
                notesContainer.innerHTML = '<div class="empty-state"><h2>Login required</h2><p>Please sign in to view your notes.</p></div>';
            }
        }

        function showStatus(message, isError = false) {
            authStatus.textContent = message;
            authStatus.classList.toggle('hidden', !message);
            authStatus.style.color = isError ? '#ef4444' : '#22c55e';
        }

        async function initSupabase() {
            const { __ENV__ } = window;
            if (!__ENV__?.SUPABASE_URL || !__ENV__?.SUPABASE_ANON_KEY) {
                notesContainer.innerHTML = '<div class="empty-state"><h2>Env missing</h2><p>Supabase URL or anon key not provided.</p></div>';
                return;
            }

            supabaseClient = window.supabase.createClient(__ENV__.SUPABASE_URL, __ENV__.SUPABASE_ANON_KEY);

            const { data } = await supabaseClient.auth.getSession();
            session = data?.session ?? null;
            handleSessionChange(session);

            supabaseClient.auth.onAuthStateChange((_event, newSession) => {
                session = newSession;
                handleSessionChange(newSession);
            });
        }

        function handleSessionChange(currentSession) {
            if (currentSession?.user) {
                sessionEmail.textContent = currentSession.user.email;
                toggleAuthUI(true);
                fetchNotes();
            } else {
                toggleAuthUI(false);
            }
        }

        async function fetchNotes() {
            if (!session?.access_token) return;
            try {
                notesContainer.textContent = 'Loading notes...';
                const response = await fetch(API_URL, {
                    headers: {
                        Authorization: `Bearer ${session.access_token}`
                    }
                });

                if (response.status === 401) {
                    handleSessionChange(null);
                    return;
                }

                if (!response.ok) throw new Error('Failed to fetch notes');
                const notes = await response.json();
                renderNotes(notes);
            } catch (error) {
                console.error('Error:', error);
                notesContainer.innerHTML = '<div class="empty-state"><h2>Error loading notes</h2><p>Please try again later.</p></div>';
            }
        }

        function renderNotes(notes) {
            if (notes.length === 0) {
                notesContainer.innerHTML = '<div class="empty-state"><h2>No notes yet</h2><p>Create your first note above to get started!</p></div>';
                return;
            }

            notesContainer.className = 'notes-grid';
            notesContainer.innerHTML = notes.map(note => `
                <div class="note-card" data-id="${note.id}">
                    <h3>${escapeHtml(note.title)}</h3>
                    <p>${escapeHtml(note.content)}</p>
                    <div class="note-meta">
                        <span class="note-date">${formatDate(note.created_at)}</span>
                        <button class="btn btn-delete" onclick="deleteNote(${note.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins} min ago`;
            if (diffHours < 24) return `${diffHours} hour${diffHours > 1 ? 's' : ''} ago`;
            if (diffDays < 7) return `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;

            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        noteForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = titleInput.value.trim();
            const content = contentInput.value.trim();

            if (!title || !content || !session?.access_token) return;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        Authorization: `Bearer ${session.access_token}`
                    },
                    body: JSON.stringify({ title, content })
                });

                if (response.status === 401) {
                    handleSessionChange(null);
                    return;
                }

                if (!response.ok) throw new Error('Failed to create note');

                titleInput.value = '';
                contentInput.value = '';
                fetchNotes();
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to create note. Please try again.');
            }
        });

        async function deleteNote(id) {
            if (!confirm('Are you sure you want to delete this note?')) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE',
                    headers: {
                        Authorization: `Bearer ${session.access_token}`
                    }
                });

                if (response.status === 401) {
                    handleSessionChange(null);
                    return;
                }

                if (!response.ok) throw new Error('Failed to delete note');
                fetchNotes();
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to delete note. Please try again.');
            }
        }

        window.deleteNote = deleteNote;

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!supabaseClient) return;
            showStatus('Signing in...', false);
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                showStatus(error.message, true);
                return;
            }

            showStatus('Signed in successfully');
        });

        logoutBtn.addEventListener('click', async () => {
            if (!supabaseClient) return;
            await supabaseClient.auth.signOut();
            session = null;
            handleSessionChange(null);
        });

        initSupabase();
    </script>
</body>
</html>
