services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: notesuser
      POSTGRES_PASSWORD: notespass123
      POSTGRES_DB: notesdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notesuser -d notesdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notes_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${APP_PORT:-3068}:3068"
    environment:
      NODE_ENV: production
      PORT: 3068
      DATABASE_URL: postgresql://notesuser:notespass123@db:5432/notesdb
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3068/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
    networks:
      - notes_network

volumes:
  postgres_data:

networks:
  notes_network:
